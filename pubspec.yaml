name: heimdall
description: HEIMDALL - Smart helmet Flutter App for motorcycle IoT system
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_blue_plus: ^1.32.12
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  collection: ^1.18.0
  cupertino_icons: ^1.0.8
  audio_service: ^0.18.15
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  rxdart: ^0.28.0
  external_app_launcher: ^4.0.3
  nowplaying: ^3.0.3
  flutter_background_service: ^5.1.0
  android_intent_plus: ^6.0.0
  speech_to_text: ^7.3.0
  http: ^1.6.0
  osm_nominatim: ^4.0.1
  flutter_sms: ^3.0.1
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
